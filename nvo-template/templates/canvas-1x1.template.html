<!doctype html>
<html lang="en">
  <!-- 1:1 host — pillarbox + blurred fill (NVO_STYLE_BIBLE.md §1.5, §7 decision #2:
       standardized on blur-pillarbox for squares, not the one-off center-crop seen
       in Singapore Masters). Blur layer plays the SAME shots as the sharp column so
       the blurred fill visually matches whatever's sharp in the center.
       Filled by scripts/compose.mjs. Scale factor 1080/1920 = 0.5625 (native height
       1920 scaled to fit the 1080 square height); centered column width ≈ 607.5px.

       Media must be a direct child of THIS root (not inside inner.html, which is a
       sub-composition — see architecture note in compose.mjs / inner.template.html),
       so the sharp shots + product shot are duplicated here in #bg-sharp, positioned
       to exactly overlap #inner-wrap (same left/width/height) so the scaled-down
       text/logo/CTA overlay lines up with the sharp footage beneath it. -->
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1080px; overflow: hidden; background: #000; }
      #blur-layer { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
      #blur-layer video {
        position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
        filter: blur(48px) brightness(0.85); transform: scale(1.15);
      }
      #bg-sharp {
        position: absolute; top: 0; left: 236.25px; width: 607.5px; height: 1080px;
        overflow: hidden; z-index: 1;
      }
      #bg-sharp video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
      #inner-wrap {
        position: absolute; top: 0; left: 236.25px; width: 607.5px; height: 1080px;
        overflow: hidden; z-index: 2;
      }
      #inner-wrap .scaler { width: 1080px; height: 1920px; transform: scale(0.5625); transform-origin: top left; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="root-1x1" data-start="0" data-width="1080" data-height="1080">
      <div id="blur-layer">
        {{SHOT_VIDEO_TAGS_BLUR}}
        {{PRODUCT_SHOT_TAG_BLUR}}
      </div>
      <div id="bg-sharp">
        {{SHOT_VIDEO_TAGS_SHARP}}
        {{PRODUCT_SHOT_TAG_SHARP}}
      </div>
      <div id="inner-wrap">
        <div class="scaler">
          <div id="overlay-embed" data-composition-id="inner-embed" data-composition-src="compositions/inner.html" data-start="0" data-duration="{{TOTAL_DURATION}}"></div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.set({}, {}, {{TOTAL_DURATION}});
      window.__timelines["root-1x1"] = tl;
    </script>
  </body>
</html>
