<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }
      body { font-family: "Inter", "Montserrat", sans-serif; color: #fff; }
      :root {
        --nvo-pill: #1e3fe0;
        --nvo-accent: #ffd54a;
        --nvo-secondary: #c6ff3d;
        --nvo-shadow: 0 3px 10px rgba(0,0,0,.35);
      }
      .safe-col { position: absolute; left: 7%; top: 12%; width: 80%; z-index: 5; }
      #hook .line { font-size: 82px; font-weight: 800; line-height: 1.1; text-shadow: 0 2px 8px rgba(0,0,0,.55); }
      #hook .hero-word { font-size: 148px; font-family: "Playfair Display", Georgia, serif; font-style: italic; font-weight: 700; margin-top: 10px; background: linear-gradient(90deg, #ff3d00, var(--nvo-accent)); -webkit-background-clip: text; background-clip: text; color: transparent; filter: drop-shadow(0 3px 8px rgba(0,0,0,.4)); }
      .subtitle-badge { display: inline-block; margin-top: 24px; padding: 18px 32px; border-radius: 999px; background: var(--nvo-pill); font-size: 36px; font-weight: 700; }

      .logo-grid-wrap { position: absolute; left: 0; top: 38%; width: 100%; display: flex; justify-content: center; z-index: 5; }
      .logo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; width: 74%; }
      .logo-card { background: #fff; border-radius: 22px; padding: 38px 42px; display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0.85); box-shadow: 0 6px 20px rgba(0,0,0,.25); }
      .logo-card img { max-width: 100%; max-height: 175px; object-fit: contain; }

      .proof-block { top: 38%; }
      .secondary-block { top: 58%; }
      .bullet { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; padding: 18px 24px; border-radius: 999px; background: #fff; color: #0b1a3a; font-size: 40px; font-weight: 700; width: fit-content; opacity: 0; transform: translateX(-16px); box-shadow: var(--nvo-shadow); }
      .bullet .dot { width: 22px; height: 22px; border-radius: 50%; background: var(--nvo-accent); flex: none; }
      .numbered-badge { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; padding: 18px 24px; border-radius: 999px; background: var(--nvo-pill); color: #fff; font-size: 38px; font-weight: 700; width: fit-content; opacity: 0; transform: translateX(-16px); box-shadow: var(--nvo-shadow); }
      .numbered-badge .badge-number { color: var(--nvo-accent); font-weight: 800; margin-right: 4px; }
      .cumulative-pill { display: inline-block; margin-bottom: 16px; padding: 16px 26px; border-radius: 999px; background: var(--nvo-pill); color: #fff; font-size: 38px; font-weight: 700; width: fit-content; opacity: 0; transform: scale(0.7); box-shadow: var(--nvo-shadow); }
      .cumulative-pill--accent { background: var(--nvo-accent); color: #0b1a3a; }

      #checklist { top: 38%; }
      #checklist .heading { font-size: 48px; font-weight: 800; margin-bottom: 20px; }
      .item { display: flex; align-items: center; gap: 16px; font-size: 40px; font-weight: 700; margin-bottom: 18px; color: var(--nvo-secondary); opacity: 0; transform: translateX(-16px); }
      .item--toggle { justify-content: space-between; color: #fff; background: rgba(255,255,255,.14); padding: 14px 24px; border-radius: 999px; }
      .check-mark { width: 48px; height: 48px; border-radius: 50%; background: var(--nvo-secondary); display: inline-flex; align-items: center; justify-content: center; flex: none; }
      .check-mark--numbered { background: var(--nvo-pill); color: #fff; font-weight: 800; font-size: 30px; }
      .check-toggle { width: 64px; height: 34px; border-radius: 999px; background: rgba(255,255,255,.35); position: relative; flex: none; }
      .check-toggle-knob { position: absolute; top: 3px; left: 3px; width: 28px; height: 28px; border-radius: 50%; background: #fff; }

      .cta-pill { display: inline-block; padding: 24px 38px; border-radius: 999px; background: var(--nvo-pill); font-size: 46px; font-weight: 800; opacity: 0; transform: scale(0.9); box-shadow: var(--nvo-shadow); }
      .cta-pill--allcaps { text-transform: uppercase; }
      .cta-pill .accent { color: var(--nvo-accent); }
      .cta-icon { margin-right: 14px; }
      #cta-wrap { position: absolute; left: 0; top: 60%; width: 100%; display: flex; justify-content: center; z-index: 5; }
    </style>
  </head>
  <body>
    <div id="inner-root" data-composition-id="inner" data-start="0" data-width="1080" data-height="1920">
      <div id="scrim" class="clip" data-start="0" data-duration="{{TOTAL_DURATION}}" data-track-index="0"></div>
      {{HOOK_BLOCK}}
      {{PROOF_BLOCK}}
      {{SECONDARY_PROOF_BLOCK}}
      {{CHECKLIST_BLOCK}}
      {{CTA_BLOCK}}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      {{GSAP_TIMELINE_BODY}}
      tl.set({}, {}, {{TOTAL_DURATION}});
      window.__timelines["inner"] = tl;
    </script>
  </body>
</html>
