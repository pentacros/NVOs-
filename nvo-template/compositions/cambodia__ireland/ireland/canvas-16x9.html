<!doctype html>
<html lang="en">
  <!-- 16:9 host — pillarbox + blurred fill, confirmed identical across every campaign
       checked (NVO_STYLE_BIBLE.md §1.5). Same scale factor as 1:1 (1080/1920 = 0.5625,
       since both fit the native 1920px height into a 1080px canvas height); centered
       column width ≈ 607.5px, now centered in a 1920-wide canvas. Filled by
       scripts/compose.mjs.

       Media must be a direct child of THIS root, not inside inner.html (a
       sub-composition — see architecture note in compose.mjs), so the sharp shots +
       product shot are duplicated here in #bg-sharp, positioned to exactly overlap
       #inner-wrap so the scaled overlay lines up with the sharp footage beneath it. -->
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; }
      #blur-layer { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
      #blur-layer video {
        position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
        filter: blur(48px) brightness(0.85); transform: scale(1.15);
      }
      #bg-sharp {
        position: absolute; top: 0; left: 656.25px; width: 607.5px; height: 1080px;
        overflow: hidden; z-index: 1;
      }
      #bg-sharp video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
      #inner-wrap {
        position: absolute; top: 0; left: 656.25px; width: 607.5px; height: 1080px;
        overflow: hidden; z-index: 2;
      }
      #inner-wrap .scaler { width: 1080px; height: 1920px; transform: scale(0.5625); transform-origin: top left; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="root-16x9" data-start="0" data-width="1920" data-height="1080">
      <div id="blur-layer">
        <video id="bgblur1" class="clip" data-start="0" data-duration="3" data-track-index="2" src="assets/cambodia/shot1_angkorwat_drone.mp4" muted></video>
        <video id="bgblur2" class="clip" data-start="3" data-duration="2" data-track-index="2" src="assets/cambodia/shot2_angkorwat_sunset.mp4" muted></video>
        <video id="bgblur3" class="clip" data-start="5" data-duration="20.29" data-track-index="2" src="assets/cambodia/shot3_independence_monument.mp4" muted></video>
        <video id="productshot-blur" class="clip" data-start="3.5" data-duration="19.29" data-track-index="3" src="assets/cambodia/product_demo.mp4" muted></video>
      </div>
      <div id="bg-sharp">
        <video id="shot1" class="clip" data-start="0" data-duration="3" data-track-index="0" src="assets/cambodia/shot1_angkorwat_drone.mp4" muted></video>
        <video id="shot2" class="clip" data-start="3" data-duration="2" data-track-index="0" src="assets/cambodia/shot2_angkorwat_sunset.mp4" muted></video>
        <video id="shot3" class="clip" data-start="5" data-duration="20.29" data-track-index="0" src="assets/cambodia/shot3_independence_monument.mp4" muted></video>
        <video id="productshot" class="clip" data-start="3.5" data-duration="19.29" data-track-index="1" src="assets/cambodia/product_demo.mp4" muted></video>
      </div>
      <div id="inner-wrap">
        <div class="scaler">
          <div id="overlay-embed" data-composition-id="inner-embed" data-composition-src="compositions/cambodia__ireland/ireland/inner.html" data-start="0" data-duration="25.29"></div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.set({}, {}, 25.29);
      window.__timelines["root-16x9"] = tl;
    </script>
  </body>
</html>
