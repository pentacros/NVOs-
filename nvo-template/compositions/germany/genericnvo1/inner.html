<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }
      body { font-family: "Montserrat", "Inter", sans-serif; color: #fff; }
      :root {
        --nvo-scrim: linear-gradient(to bottom, rgba(6,16,34,.64) 0%, rgba(6,16,34,.2) 40%, rgba(0,0,0,0) 70%);
        --nvo-safe-left: 6%;
        --nvo-safe-right: 14%;
        --nvo-safe-top: 10%;
        --nvo-safe-bottom: 18%;
        --nvo-pill-blue: #1E3FE0;
        --nvo-highlight: #00a651;
        --nvo-accent: #ffd54a;
        --nvo-text-shadow: 0 2px 6px rgba(0,0,0,.55), 0 1px 14px rgba(0,0,0,.35);
      }
      #scrim { position: absolute; inset: 0; z-index: 1; background: var(--nvo-scrim); pointer-events: none; }
      .safe-col { position: absolute; left: var(--nvo-safe-left); top: var(--nvo-safe-top); width: calc(100% - var(--nvo-safe-left) - var(--nvo-safe-right)); z-index: 5; }
      #hook { top: var(--nvo-safe-top); }
      #hook .line { font-size: 72px; font-weight: 700; line-height: 1.08; text-shadow: var(--nvo-text-shadow); }
      #hook .hero-word { font-size: 120px; font-weight: 800; color: var(--nvo-highlight); margin-top: 10px; }
      #hook .subtitle-badge { display: inline-block; margin-top: 24px; padding: 15px 28px; border-radius: 999px; background: rgba(255,255,255,.16); font-size: 32px; font-weight: 600; box-shadow: inset 0 0 0 1px rgba(255,255,255,.25); }
      .logo-grid-wrap { position: absolute; left: 0; top: 40%; width: 100%; display: flex; justify-content: center; z-index: 5; }
      .logo-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; width: 72%; }
      .logo-card { background: rgba(255,255,255,.96); border-radius: 20px; padding: 24px 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 18px rgba(0,0,0,.25); opacity: 0; transform: scale(.9); }
      .logo-card img { max-width: 100%; max-height: 136px; object-fit: contain; }
      #proof-bullets { top: 38%; }
      #proof-bullets .bullet { display: flex; align-items: center; gap: 12px; padding: 12px 22px; margin-bottom: 14px; background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.25); border-radius: 999px; font-size: 38px; font-weight: 700; width: fit-content; opacity: 0; transform: translateX(-16px); }
      #checklist { top: 34%; }
      #checklist .heading { font-size: 46px; font-weight: 700; margin-bottom: 16px; color: var(--nvo-highlight); }
      #checklist .item { display: flex; align-items: center; gap: 14px; font-size: 38px; margin-bottom: 14px; opacity: 0; transform: translateX(-16px); }
      #checklist .item .bullet-mark { width: 42px; height: 42px; border-radius: 50%; background: var(--nvo-highlight); display: inline-flex; align-items: center; justify-content: center; }
      .cta-pill { display: inline-block; background: var(--nvo-pill-blue); border-radius: 999px; padding: 22px 38px; font-weight: 800; font-style: italic; font-size: 42px; opacity: 0; transform: scale(.9); box-shadow: 0 6px 18px rgba(0,0,0,.25); }
      .cta-pill .accent { color: var(--nvo-accent); }
      #cta-wrap { position: absolute; left: 0; top: 56%; width: 100%; display: flex; justify-content: center; z-index: 5; }
    </style>
  </head>
  <body>
    <div id="inner-root" data-composition-id="inner" data-start="0" data-width="1080" data-height="1920">
      <div id="scrim" class="clip" data-start="0" data-duration="15" data-track-index="0"></div>
      
      <div id="hook" class="safe-col clip" data-start="0" data-duration="8" data-track-index="1">
        <div class="line">Study in</div>
        <div class="line hero-word">Germany</div>
        <div class="subtitle-badge" id="hook-subtitle">where BMW, Volkswagen &amp; Porsche hire from</div>
      </div>
      <div id="hook-logos" class="clip" data-start="3.5" data-duration="4.5" data-track-index="2">
        <div class="logo-grid-wrap">
        <div class="logo-grid">
            <div class="logo-card" id="hlogo1"><img src="assets/germany/bugatti.jpg" /></div>
            <div class="logo-card" id="hlogo2"><img src="assets/germany/bmw.jpg" /></div>
            <div class="logo-card" id="hlogo3"><img src="assets/germany/vw.png" /></div>
            <div class="logo-card" id="hlogo4"><img src="assets/germany/porsche.png" /></div>
        </div>
      </div>
      </div>
      
      
      <div id="checklist" class="safe-col clip" data-start="8" data-duration="4" data-track-index="1">
        <div class="heading">Get:</div>
        <div class="item" id="check1"><span class="bullet-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#0b1a3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 17 20 6"></polyline></svg></span>Admit Eligibility</div>
        <div class="item" id="check2"><span class="bullet-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#0b1a3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 17 20 6"></polyline></svg></span>Top Jobs After Graduation</div>
        <div class="item" id="check3"><span class="bullet-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#0b1a3a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 17 20 6"></polyline></svg></span>Expenses &amp; Earnings</div>
      </div>
      
      <div id="cta-wrap" class="clip" data-start="12" data-duration="3" data-track-index="1">
        <div class="cta-pill" id="cta">Check <span class="accent">Eligibility</span></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from("#hook .line", { opacity: 0, duration: 0.4, stagger: 0.25 }, 0.1);
      tl.to("#hlogo1", { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2)" }, 3.5);
      tl.to("#hlogo2", { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2)" }, 3.75);
      tl.to("#hlogo3", { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2)" }, 4);
      tl.to("#hlogo4", { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2)" }, 4.25);
      tl.fromTo("#hook-subtitle", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.3 }, 1.1);
      tl.to("#check1", { opacity: 1, x: 0, duration: 0.35, ease: "power2.out" }, 8);
      tl.to("#check2", { opacity: 1, x: 0, duration: 0.35, ease: "power2.out" }, 8.6);
      tl.to("#check3", { opacity: 1, x: 0, duration: 0.35, ease: "power2.out" }, 9.2);
      tl.fromTo("#cta", { opacity: 0, scale: 0.85, filter: "blur(6px)" }, { opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.35, ease: "back.out(1.7)" }, 12);
      tl.set({}, {}, 15);
      window.__timelines["inner"] = tl;
    </script>
  </body>
</html>
